<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AQI Prediction — Live Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 700px;
            margin: 80px auto;
            padding: 0 20px;
            text-align: center;
            line-height: 1.6;
            color: #1a1a2e;
            background: #f8f9fa;
        }
        h1 { color: #1a1a2e; }
        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            margin: 30px 0;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .btn {
            display: inline-block;
            background: #4361ee;
            color: white;
            padding: 16px 36px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.2em;
            margin: 15px 0;
        }
        .btn:hover { background: #3651d4; }
        .stats { display: flex; justify-content: center; gap: 30px; margin: 25px 0; flex-wrap: wrap; }
        .stat { text-align: center; }
        .stat .num { font-size: 1.8em; font-weight: 700; color: #4361ee; }
        .stat .label { font-size: 0.85em; color: #666; }
        .repo-link { color: #4361ee; text-decoration: none; }
        .repo-link:hover { text-decoration: underline; }
    </style>
    <meta http-equiv="refresh" content="0; url=https://aqilive.streamlit.app">
</head>
<body>
    <div class="card">
        <h1>Air Quality Index (AQI) Prediction</h1>
        <div class="stats">
            <div class="stat"><div class="num">26</div><div class="label">Cities</div></div>
            <div class="stat"><div class="num">29,531</div><div class="label">Data Points</div></div>
            <div class="stat"><div class="num">7</div><div class="label">Models</div></div>
            <div class="stat"><div class="num">0.94</div><div class="label">R² Score</div></div>
        </div>
        <a class="btn" href="https://aqilive.streamlit.app" target="_blank">Open Dashboard →</a>
        <p style="margin-top: 20px; color: #666;">
            Predict AQI from pollutant levels, explore SHAP insights, and generate 7-day forecasts.
        </p>
        <p style="margin-top: 30px; color: #888; font-size: 0.9em;">
            <a class="repo-link" href="https://github.com/Sahityabiswas/ML_BASED_AQI_PREDICTION">View on GitHub</a>
        </p>
    </div>
</body>
</html>
