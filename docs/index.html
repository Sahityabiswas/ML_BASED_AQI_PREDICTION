<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AQI Dashboard — Waking Up...</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:linear-gradient(135deg,#0f0c29,#302b63 50%,#24243e);
  min-height:100vh; display:flex; align-items:center; justify-content:center; color:#e8e8f0;
}
.card {
  background:rgba(255,255,255,0.05); backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.08); border-radius:24px; padding:48px 40px;
  max-width:480px; width:90%; text-align:center; box-shadow:0 24px 80px rgba(0,0,0,0.5);
}
.icon { font-size:3rem; margin-bottom:16px; display:block; }
.title { font-size:1.6rem; font-weight:700; margin-bottom:6px; }
.subtitle { color:#a0a0b8; font-size:0.95rem; margin-bottom:32px; }
.bar-wrap { width:100%; height:8px; background:rgba(255,255,255,0.08); border-radius:99px; overflow:hidden; margin-bottom:12px; }
.bar { height:100%; width:0%; border-radius:99px; background:linear-gradient(90deg,#6c63ff,#a855f7); transition:width .3s; }
.label { font-size:.85rem; color:#a0a0b8; min-height:1.4em; }
.dots { margin-top:20px; display:flex; gap:4px; justify-content:center; }
.dots span { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.15); animation:blink 1.4s infinite both; }
.dots span:nth-child(2) { animation-delay:.2s; }
.dots span:nth-child(3) { animation-delay:.4s; }
@keyframes blink { 0%,80%,100%{opacity:.3} 40%{opacity:1;background:#6c63ff} }
.btn { display:none; margin:16px auto 0; padding:16px 40px; background:linear-gradient(135deg,#6c63ff,#a855f7); color:white; border:none; border-radius:14px; font-size:1.15rem; font-weight:700; cursor:pointer; text-decoration:none; box-shadow:0 4px 24px rgba(108,99,255,0.3); transition:all .25s; }
.btn:hover { transform:translateY(-3px); box-shadow:0 8px 32px rgba(108,99,255,0.5); }
.ready { display:none; color:#28a745; font-weight:600; margin-top:16px; font-size:.95rem; }
.timeout { display:none; color:#a0a0b8; font-size:.85rem; margin-top:12px; }
.footer { margin-top:28px; color:rgba(255,255,255,0.2); font-size:.75rem; }
</style>
</head>
<body>
<div class="card">
<span class="icon">🌿</span>
<div class="title">AQI Prediction Dashboard</div>
<div class="subtitle">Waking up the server — just a moment</div>
<div class="bar-wrap"><div class="bar" id="bar"></div></div>
<div class="label" id="label">Initializing...</div>
<div class="dots" id="dots"><span></span><span></span><span></span></div>
<a class="btn" id="btn" href="https://ml-based-aqi-prediction.onrender.com" target="_blank">🚀 Launch Dashboard</a>
<div class="ready" id="ready">✓ Server is ready!</div>
<div class="timeout" id="timeout">Taking too long? <a href="https://ml-based-aqi-prediction.onrender.com" style="color:#6c63ff;">Open directly</a></div>
<div class="footer">ml-based-aqi-prediction.onrender.com</div>
</div>
<script>
(function(){
var T='https://ml-based-aqi-prediction.onrender.com', D=60, bar=document.getElementById('bar'), lb=document.getElementById('label'), ds=document.getElementById('dots'), btn=document.getElementById('btn'), rt=document.getElementById('ready'), tm=document.getElementById('timeout'), rdy=!1, pi=null, pi2=null;
function sp(p,t){bar.style.width=p+'%';lb.textContent=t;}
function rd(){if(rdy)return;rdy=!0;clearInterval(pi);clearInterval(pi2);sp(100,'100% — Ready!');ds.style.display='none';btn.style.display='inline-block';rt.style.display='block';tm.style.display='none';}
var st=Date.now();
pi=setInterval(function(){var e=(Date.now()-st)/1000,p=Math.min(100,Math.round(e/D*100));sp(p,p>=100?'Waiting for server...':'Waking up... '+p+'%');if(p>=100)clearInterval(pi);},250);
function pg(){var c=new AbortController(),t=setTimeout(function(){c.abort();},8000);fetch(T,{signal:c.signal,mode:'no-cors'}).then(function(){clearTimeout(t);rd();}).catch(function(){clearTimeout(t);});}
pg();pi2=setInterval(pg,3000);
setTimeout(function(){if(!rdy){rdy=!0;clearInterval(pi);clearInterval(pi2);sp(100,'');ds.style.display='none';btn.style.display='inline-block';tm.style.display='block';}},D+15*1000);
})();
</script>
</body>
</html>
